<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Convite Especial — Envelope Realista (embutir imagem)</title>
<style>
  :root{--w:720;--h:1280}
  html,body{height:100%;margin:0;background:#0f0f10;color:#fff;font-family:Georgia, 'Times New Roman', serif;display:flex;align-items:center;justify-content:center}
  .stage-wrap{width:360px}
  .stage{width:100%;aspect-ratio:9/16;border-radius:18px;overflow:hidden;position:relative;background:linear-gradient(180deg,#fff6f9 0%, #fdeef6 45%, #fffafc 100%);box-shadow:0 20px 40px rgba(0,0,0,0.45)}
  .controls{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
  button,input[type="file"]{padding:8px 12px;border-radius:8px;border:0;background:#e9cde6;color:#2b0b2a;font-weight:600;cursor:pointer}
  small{display:block;text-align:center;margin-top:8px;color:#444}
  .hint{font-size:12px;color:#6b4a5d;text-align:center;margin-top:6px}
  @media (max-width:420px){ .stage-wrap{width:260px} }
</style>
</head>
<body>
  <div class="stage-wrap">
    <div class="stage">
      <canvas id="canvas" width="720" height="1280" style="width:100%;height:100%;display:block"></canvas>
    </div>
    <div class="controls">
      <button id="playBtn">Reproduzir</button>
      <button id="recordBtn">Iniciar gravação</button>
      <button id="stopBtn" disabled>Parar & Baixar</button>
    </div>
    <div class="hint">Imagem embutida: troque a string DATA_URL_HERE por sua dataURL Base64 da imagem.</div>
    <small>Formato: 9:16 — Abertura ~2.5s — Duração total ~8s — Sem som.</small>
  </div>

<script>
/* ---------- CONFIG ---------- */
const OPEN_DURATION = 2500; // ms (abertura suave ~2.5s)
const TOTAL_DURATION = 8000; // ms total da animação
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let startTime = null, animRequest = null, playing = false;

/* ---------- COLOQUE AQUI SUA IMAGEM EMBUTIDA (data URL) ---------- */
/* Substitua exatamente a string abaixo por: "data:image/png;base64,...." ou "data:image/jpeg;base64,...." */
const EMBEDDED_IMAGE_DATAURL = 'DATA_URL_HERE';
/* --------------------------------------------------------------- */

let img = null;

// util
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function easeOutCubic(x){ return 1 - Math.pow(1-x, 3); }

/* ---------- load embedded image if set ---------- */
if(EMBEDDED_IMAGE_DATAURL && EMBEDDED_IMAGE_DATAURL !== 'DATA_URL_HERE'){
  img = new Image();
  img.onload = ()=> drawInitial();
  img.src = EMBEDDED_IMAGE_DATAURL;
} else {
  // placeholder render
  drawInitial();
}

/* ---------- drawing helpers ---------- */
function drawBackground(){
  const w = canvas.width, h = canvas.height;
  const g = ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#fff7fb'); g.addColorStop(0.45,'#fdeef6'); g.addColorStop(1,'#fffafc');
  ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
  ctx.fillStyle = 'rgba(0,0,0,0.02)'; roundRect(ctx, 12,12,w-24,h-24,26); ctx.fill();
}

function drawInitial(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBackground();
  if(!img){
    // placeholder
    ctx.fillStyle = '#ead3df';
    roundRect(ctx, 90, 320, canvas.width-180, 360, 18); ctx.fill();
    ctx.fillStyle = '#6b3f25'; ctx.font='26px Georgia'; ctx.textAlign='center'; ctx.fillText('Carregue sua imagem', canvas.width/2, 540);
    return;
  }
  // draw embedded image scaled to cover
  const cw=canvas.width,ch=canvas.height, iw=img.width, ih=img.height;
  const scale = Math.max(cw/iw, ch/ih);
  const iwS = iw*scale, ihS = ih*scale;
  const sx = (cw - iwS)/2, sy = (ch - ihS)/2;
  ctx.drawImage(img, sx, sy, iwS, ihS);
  // soft overlay for elegance
  ctx.globalAlpha = 0.06; ctx.fillStyle='#000'; ctx.fillRect(0,0,cw,ch); ctx.globalAlpha=1;
}

/* ---------- main animator ---------- */
function renderFrame(ts){
  if(!startTime) startTime = ts;
  const elapsed = ts - startTime;
  const p = clamp(elapsed / TOTAL_DURATION, 0, 1);

  const flapProgress = easeOutCubic( clamp((elapsed) / OPEN_DURATION, 0, 1) ); // 0..1 open in OPEN_DURATION
  const cardReveal = easeOutCubic( clamp((elapsed - OPEN_DURATION*0.55) / (TOTAL_DURATION - OPEN_DURATION*0.55), 0, 1) );

  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBackground();

  if(!img){
    drawInitial();
  } else {
    // draw full image as base (closed envelope)
    const cw=canvas.width,ch=canvas.height, iw=img.width, ih=img.height;
    const scale = Math.max(cw/iw, ch/ih);
    const iwS = iw*scale, ihS = ih*scale;
    const sx = (cw - iwS)/2, sy = (ch - ihS)/2;
    ctx.drawImage(img, sx, sy, iwS, ihS);

    // flap geometry heuristics (like previous version)
    const pivot = {x:cw/2, y: Math.round(ch*0.33)};
    const leftX = Math.round(cw*0.12);
    const rightX = cw - leftX;
    const A = {x:pivot.x, y: Math.round(ch*0.10)};
    const L = {x:leftX, y:pivot.y};
    const R = {x:rightX, y:pivot.y};

    // draw inner card sliding up
    drawInnerCard(pivot, cardReveal);

    // remove flap area from base by clearing triangle and redrawing image
    ctx.save();
    // create mask to remove flap area
    ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(R.x,R.y); ctx.lineTo(L.x,L.y); ctx.closePath();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    // redraw base image to keep outside-flap parts crisp
    ctx.drawImage(img, sx, sy, iwS, ihS);
    ctx.restore();

    // extract flap region to offscreen and rotate
    const minX = Math.min(A.x,L.x,R.x)-2, maxX = Math.max(A.x,L.x,R.x)+2;
    const minY = Math.min(A.y,L.y,R.y)-2, maxY = Math.max(A.y,L.y,R.y)+2;
    const fw = Math.max(1, Math.round(maxX - minX)), fh = Math.max(1, Math.round(maxY - minY));
    const off = document.createElement('canvas'); off.width=fw; off.height=fh;
    const offCtx = off.getContext('2d');
    offCtx.drawImage(img, sx - minX, sy - minY, iwS, ihS);
    // mask to triangle
    offCtx.globalCompositeOperation = 'destination-in';
    offCtx.beginPath();
    offCtx.moveTo(A.x - minX, A.y - minY); offCtx.lineTo(R.x - minX, R.y - minY); offCtx.lineTo(L.x - minX, L.y - minY); offCtx.closePath();
    offCtx.fill();
    offCtx.globalCompositeOperation = 'source-over';
    // slight underside shading
    const shade = offCtx.createLinearGradient(0,0,0,fh); shade.addColorStop(0,'rgba(0,0,0,0.02)'); shade.addColorStop(1,'rgba(0,0,0,0.08)');
    offCtx.fillStyle = shade; offCtx.fillRect(0,0,fw,fh);

    // rotation
    const closedAngle = 0;
    const openAngle = -Math.PI * 0.72; // ~-130deg
    const angle = closedAngle + (openAngle - closedAngle) * flapProgress;
    const pivotRelX = pivot.x - minX, pivotRelY = pivot.y - minY;

    ctx.save();
    ctx.translate(minX + pivotRelX, minY + pivotRelY);
    ctx.translate(0, -18 * flapProgress); // slight lift
    ctx.rotate(angle);
    ctx.drawImage(off, -pivotRelX, -pivotRelY);
    // soft shadow when open
    if(flapProgress > 0.05){
      ctx.globalAlpha = 0.22 * flapProgress;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(0, pivotRelY + 28, 150*flapProgress, 40*flapProgress, 0,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.restore();

    // golden particles
    drawParticles(performance.now(), flapProgress);
  }

  if(p < 1){
    animRequest = requestAnimationFrame(renderFrame);
  } else {
    playing = false; animRequest = null; startTime = null;
  }
}

/* ---------- inner card draw (gold text) ---------- */
function drawInnerCard(pivot, reveal){
  const cw = canvas.width;
  const cardW = cw * 0.74, cardH = cardW * 0.62;
  const cardX = (cw - cardW)/2;
  const cardHiddenY = pivot.y + 40;
  const cardVisibleY = pivot.y - cardH*0.15;
  const y = cardHiddenY - (cardHiddenY - cardVisibleY) * reveal;

  // shadow & card
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.24)'; ctx.shadowBlur = 18;
  roundRect(ctx, cardX, y, cardW, cardH, 12); ctx.fillStyle = '#fffdf8'; ctx.fill();
  ctx.shadowBlur = 0; ctx.restore();

  // faint texture lines
  ctx.save(); ctx.globalAlpha = 0.06;
  for(let i=0;i<6;i++){
    ctx.beginPath(); ctx.moveTo(cardX + 6, y + 10 + i*18); ctx.lineTo(cardX + cardW - 6, y + 10 + i*18);
    ctx.strokeStyle = '#efe6e9'; ctx.lineWidth = 1; ctx.stroke();
  }
  ctx.restore();

  // golden text
  ctx.save(); ctx.globalAlpha = reveal;
  ctx.font = `${Math.round(cardW*0.11)}px 'Lucida Calligraphy', Georgia, serif`;
  const tx = cardX + cardW/2, ty = y + cardH/2 - 6;
  const txtG = ctx.createLinearGradient(tx - cardW*0.5, ty-30, tx + cardW*0.5, ty+30);
  txtG.addColorStop(0,'#b6883a'); txtG.addColorStop(0.5,'#f7e4b4'); txtG.addColorStop(1,'#d19a44');
  ctx.fillStyle = txtG; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Convite Especial', tx, ty);
  ctx.restore();
}

/* ---------- particles ---------- */
let particles = null;
function initParticles(){
  particles = [];
  const n = 36;
  for(let i=0;i<n;i++){
    particles.push({x: Math.random()*canvas.width, y: canvas.height*0.6 + Math.random()*200, r: 1+Math.random()*3, vx: (Math.random()-0.5)*0.2, vy: -0.05 - Math.random()*0.15, phase: Math.random()*Math.PI*2});
  }
}
function drawParticles(t, flapProg){
  if(!particles) initParticles();
  ctx.save();
  for(let p of particles){
    p.phase += 0.02;
    p.x += p.vx + Math.sin(t*0.0008 + p.phase)*0.2;
    p.y += p.vy + Math.cos(t*0.0006 + p.phase)*0.15;
    if(p.y < -20 || p.x < -50 || p.x > canvas.width + 50){
      p.x = canvas.width*0.25 + Math.random()*canvas.width*0.5;
      p.y = canvas.height*0.7 + Math.random()*160;
      p.vy = -0.05 - Math.random()*0.15;
    }
    const alpha = clamp(0.06 + 0.6 * Math.sin(p.phase*0.6) * flapProg, 0, 1);
    ctx.beginPath(); ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(255,215,120,0.95)';
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
  }
  ctx.restore();
}

/* ---------- controls (play / record) ---------- */
const playBtn = document.getElementById('playBtn');
const recordBtn = document.getElementById('recordBtn');
const stopBtn = document.getElementById('stopBtn');
let mediaRecorder = null, recordedChunks = [];

playBtn.addEventListener('click', ()=>{
  if(playing){
    if(animRequest) cancelAnimationFrame(animRequest);
    playing = false; startTime = null; playBtn.textContent='Reproduzir';
    return;
  }
  startTime = null; playing = true; playBtn.textContent='Reproduzir';
  animRequest = requestAnimationFrame(renderFrame);
});

recordBtn.addEventListener('click', ()=>{
  const stream = canvas.captureStream(60);
  recordedChunks = []; recordBtn.disabled=true; stopBtn.disabled=false;
  const options = {mimeType: 'video/webm;codecs=vp9'};
  try{ mediaRecorder = new MediaRecorder(stream, options); }catch(e){
    try{ mediaRecorder = new MediaRecorder(stream); }catch(e2){ alert('Seu navegador não suporta MediaRecorder. Use Chrome/Edge.'); recordBtn.disabled=false; stopBtn.disabled=true; return; }
  }
  mediaRecorder.ondataavailable = e => { if(e.data && e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = ()=>{
    const blob = new Blob(recordedChunks, {type:'video/webm'}); const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='convite_princesa_realista.webm'; document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url); recordBtn.disabled=false; stopBtn.disabled=true;
  };
  mediaRecorder.start();
  if(animRequest) cancelAnimationFrame(animRequest);
  startTime = null; playing = true; animRequest = requestAnimationFrame(renderFrame);
});

stopBtn.addEventListener('click', ()=>{
  if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if(animRequest) cancelAnimationFrame(animRequest);
  playing = false; startTime = null;
});

/* ---------- init ---------- */
drawInitial();
</script>
