<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Convite Especial — Envelope Realista (1080×1920)</title>
<style>
  :root{--W:1080;--H:1920}
  html,body{height:100%;margin:0;background:#0b0b0b;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center}
  .wrap{width:360px; /* scaled preview on page */ }
  .stage{width:100%;aspect-ratio:9/16;border-radius:14px;overflow:hidden;position:relative;background:linear-gradient(180deg,#fff6f6,#fff0f3);box-shadow:0 20px 50px rgba(0,0,0,0.6)}
  canvas{display:block;width:100%;height:100%;}
  .controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px 0}
  .controls > *{font-weight:700}
  input[type=file]{display:inline-block;padding:8px 10px;border-radius:8px;border:0;background:#f6e8ef;color:#3b1a2b;cursor:pointer}
  button{padding:8px 12px;border-radius:10px;border:0;background:linear-gradient(145deg,#f7e0b2,#d9a43a);color:#3b1a2b;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,0.25);font-weight:700}
  button:active{transform:translateY(1px)}
  .hint{font-size:12px;color:#5a3b3b;text-align:center;margin-top:6px}
  /* golden confirm button */
  .confirm-wrap{display:flex;justify-content:center;margin-top:10px}
  .confirm-btn{
    display:inline-flex;align-items:center;gap:10px;padding:14px 24px;border-radius:40px;text-decoration:none;
    background:linear-gradient(145deg,#f9e7c4,#e4b765);
    color:#4a2b00;font-weight:800;box-shadow:0 8px 24px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.45);
    position:relative;overflow:visible;transition:transform .25s;
  }
  .confirm-btn:hover{transform:translateY(-4px)}
  .flower-left,.flower-right{position:absolute;font-size:20px;opacity:0.9}
  .flower-left{left:-16px;top:-8px}
  .flower-right{right:-16px;bottom:-8px}
  /* shimmer */
  .shimmer {
    position:absolute;left:-60%;top:-10%;width:40%;height:120%;transform:rotate(-18deg);
    background:linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.65) 50%, rgba(255,255,255,0) 100%);
    mix-blend-mode:overlay;opacity:0.0;pointer-events:none;border-radius:8px;
  }
  .confirm-btn:hover .shimmer{animation:shimmerMove 1.2s ease-in-out 1}
  @keyframes shimmerMove{from{left:-60%;opacity:0}50%{left:30%;opacity:1}to{left:120%;opacity:0}}
  small {display:block;text-align:center;margin-top:8px;color:#6b4a5d}
  @media (max-width:420px){ .wrap{width:260px} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="stage">
      <canvas id="canvas" width="1080" height="1920"></canvas>
    </div>

    <div class="controls" style="margin-top:10px">
      <label style="display:inline-block">
        <input id="fileClosed" type="file" accept="image/*">
      </label>
      <label style="display:inline-block">
        <input id="fileOpen" type="file" accept="image/*">
      </label>
      <button id="playBtn">Reproduzir</button>
      <button id="recordBtn">Iniciar gravação</button>
      <button id="stopBtn" disabled>Parar & Baixar</button>
    </div>

    <div class="confirm-wrap">
      <a class="confirm-btn" id="waBtn" target="_blank"
         href="https://wa.me/5579999145044?text=Ol%C3%A1!%20Quero%20confirmar%20minha%20presen%C3%A7a.">
        <span class="flower-left">🌼</span>
        Confirmar Presença
        <span class="flower-right">🌺</span>
        <div class="shimmer"></div>
      </a>
    </div>

    <div class="hint">Formato fixo: 1080×1920 — Abertura suave ≈2.5s — Sem áudio. Use a gravação para baixar em .webm</div>
    <small>Observação: carregue a imagem fechada (1º) e a imagem aberta (2º) se quiser substituir as suas imagens atuais.</small>
  </div>

<script>
/* ---------- parâmetros ---------- */
const OPEN_MS = 2500;
const TOTAL_MS = 8000;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fileClosed = document.getElementById('fileClosed');
const fileOpen = document.getElementById('fileOpen');
const playBtn = document.getElementById('playBtn');
const recordBtn = document.getElementById('recordBtn');
const stopBtn = document.getElementById('stopBtn');

let closedImg = null;   // Image when envelope closed
let openImg = null;     // Image when envelope open (shows card)
let animReq = null;
let startTime = null;
let playing = false;
let mediaRecorder = null, recordedChunks = [];

/* ---------- helpers ---------- */
function coverDraw(img){
  const cw = canvas.width, ch = canvas.height, iw = img.width, ih = img.height;
  const scale = Math.max(cw/iw, ch/ih);
  const w = iw * scale, h = ih * scale;
  const sx = (cw - w)/2, sy = (ch - h)/2;
  ctx.drawImage(img, sx, sy, w, h);
  return {sx, sy, sw: w, sh: h};
}
function easeOutCubic(x){ return 1 - Math.pow(1-x, 3); }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

/* ---------- file loaders ---------- */
fileClosed.addEventListener('change', (e)=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => { const im = new Image(); im.onload=()=>{ closedImg = im; drawInitial(); }; im.src = r.result; };
  r.readAsDataURL(f);
});
fileOpen.addEventListener('change', (e)=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => { const im = new Image(); im.onload=()=>{ openImg = im; drawInitial(); }; im.src = r.result; };
  r.readAsDataURL(f);
});

/* ---------- initial / placeholder ---------- */
function drawPlaceholder(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // soft background
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,'#fff7fb'); g.addColorStop(1,'#fff0f4');
  ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#efdfe6';
  ctx.fillRect(120,520,canvas.width-240,600);
  ctx.fillStyle = '#6b3f25'; ctx.font='36px Georgia'; ctx.textAlign='center';
  ctx.fillText('Carregue as imagens (fechado + aberto)', canvas.width/2, canvas.height/2);
}

/* ---------- draw initial if images exist ---------- */
function drawInitial(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // background vignette
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,'#fff7fa'); g.addColorStop(0.45,'#fdeef6'); g.addColorStop(1,'#fffafc');
  ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);
  if(closedImg){
    coverDraw(closedImg);
  } else {
    drawPlaceholder();
  }
  // small tip overlay
  ctx.globalAlpha = 0.06; ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.globalAlpha=1;
}

/* ---------- particle system (gold sparkles) ---------- */
let particles = [];
function initParticles(){
  particles = [];
  for(let i=0;i<40;i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: canvas.height*0.6 + Math.random()*canvas.height*0.4,
      r: 1 + Math.random()*3,
      vx: (Math.random()-0.5)*0.6,
      vy: -0.3 - Math.random()*0.6,
      phase: Math.random()*Math.PI*2
    });
  }
}
function drawParticles(t, intensity){
  if(!particles.length) initParticles();
  ctx.save();
  for(let p of particles){
    p.phase += 0.03;
    p.x += p.vx + Math.sin(t*0.001 + p.phase)*0.2;
    p.y += p.vy + Math.cos(t*0.0008 + p.phase)*0.15;
    if(p.y < -40 || p.x < -60 || p.x > canvas.width+60){
      p.x = canvas.width*0.25 + Math.random()*canvas.width*0.5;
      p.y = canvas.height*0.75 + Math.random()*200;
      p.vy = -0.3 - Math.random()*0.6;
    }
    const a = clamp(0.04 + 0.7 * Math.sin(p.phase*0.7) * intensity, 0, 1);
    ctx.globalAlpha = a;
    ctx.fillStyle = 'rgba(255,215,120,0.95)';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

/* ---------- main render (closed -> open) ---------- */
function renderFrame(ts){
  if(!startTime) startTime = ts;
  const elapsed = ts - startTime;
  const progress = clamp(elapsed / TOTAL_MS, 0, 1);
  const openProgRaw = clamp(elapsed / OPEN_MS, 0, 1);
  const openProg = easeOutCubic(openProgRaw); // flap progress
  const revealStart = OPEN_MS * 0.5;
  const revealProg = clamp( (elapsed - revealStart) / (TOTAL_MS - revealStart), 0, 1 );
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // background gradient
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,'#fff7fa'); g.addColorStop(0.45,'#fdeef6'); g.addColorStop(1,'#fffafc');
  ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);

  // If no images, placeholder
  if(!closedImg){
    drawPlaceholder();
    if(progress < 1) animReq = requestAnimationFrame(renderFrame); else stopAnimation();
    return;
  }

  // draw base closed image as full cover
  const closedGeo = coverDraw(closedImg);

  // if open image exists, we'll blend toward it using a "flap" style mask:
  if(openImg){
    // compute flap triangle (apex top center -> pivot line near 1/3 height)
    const cw = canvas.width, ch = canvas.height;
    const pivotY = Math.round(ch*0.33);
    const apexY = Math.round(ch*0.10);
    const leftX = Math.round(cw*0.12), rightX = cw - leftX;
    const A = {x: cw/2, y: apexY}, L = {x:leftX, y:pivotY}, R = {x:rightX, y:pivotY};

    // 1) Draw open image but masked to flap area and card area as it reveals
    // Create offscreen for open image
    const iw = openImg.width, ih = openImg.height;
    const scaleOpen = Math.max(cw/iw, ch/ih);
    const wOpen = iw*scaleOpen, hOpen = ih*scaleOpen;
    const sxOpen = (cw - wOpen)/2, syOpen = (ch - hOpen)/2;

    // we'll draw the open image in two passes: card area reveal + flap crossfade
    // a) Draw open image underneath with partial mask (card reveal)
    ctx.save();
    // card reveal: vertical wipe from pivot downward based on revealProg
    const cardTop = pivotY - Math.round(ch*0.28);
    const revealY = cardTop + (pivotY - cardTop) * (1 - (1 - revealProg)); // ease already applied
    ctx.beginPath();
    ctx.rect(0, revealY, cw, ch - revealY);
    ctx.clip();
    ctx.globalAlpha = Math.min(1, revealProg*1.2);
    ctx.drawImage(openImg, sxOpen, syOpen, wOpen, hOpen);
    ctx.globalAlpha = 1;
    ctx.restore();

    // b) Flap: take triangular region and rotate/transform from closed to open using progress
    // We'll extract triangular flap region from closed image (so the flap looks consistent), render it as rotating
    // create offscreen for flap area bounding box
    const minX = Math.min(A.x, L.x, R.x)-2, maxX = Math.max(A.x,L.x,R.x)+2;
    const minY = Math.min(A.y,L.y,R.y)-2, maxY = Math.max(A.y,L.y,R.y)+2;
    const fw = Math.max(10, Math.round(maxX - minX)), fh = Math.max(10, Math.round(maxY - minY));
    const off = document.createElement('canvas'); off.width = fw; off.height = fh;
    const offCtx = off.getContext('2d');

    // draw corresponding part of closed image to offscreen
    offCtx.drawImage(closedImg, closedGeo.sx - minX, closedGeo.sy - minY, closedGeo.sw, closedGeo.sh);

    // mask to triangular flap shape
    offCtx.globalCompositeOperation = 'destination-in';
    offCtx.beginPath();
    offCtx.moveTo(A.x - minX, A.y - minY);
    offCtx.lineTo(R.x - minX, R.y - minY);
    offCtx.lineTo(L.x - minX, L.y - minY);
    offCtx.closePath();
    offCtx.fill();
    offCtx.globalCompositeOperation = 'source-over';

    // apply slight shading to underside
    const shade = offCtx.createLinearGradient(0,0,0,fh);
    shade.addColorStop(0,'rgba(0,0,0,0.02)');
    shade.addColorStop(1,'rgba(0,0,0,0.06)');
    offCtx.fillStyle = shade; offCtx.fillRect(0,0,fw,fh);

    // compute rotation angle for flap: closed 0 -> open -120deg
    const closedAngle = 0;
    const openAngle = -Math.PI * 0.72;
    const angle = closedAngle + (openAngle - closedAngle) * openProg;

    // draw flipped flap rotated around pivot
    ctx.save();
    const pivotRelX = A.x - minX, pivotRelY = A.y - minY;
    ctx.translate(minX + pivotRelX, minY + pivotRelY);
    ctx.translate(0, -18 * openProg); // tiny lift
    ctx.rotate(angle);
    ctx.drawImage(off, -pivotRelX, -pivotRelY);
    ctx.restore();

    // small shadow on card as flap opens
    if(openProg > 0.05){
      ctx.save();
      ctx.globalAlpha = 0.2 * openProg;
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath();
      ctx.ellipse(cw/2, pivotY + 90, 240 * openProg, 52 * openProg, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // overlay open image partially to blend edges (soft crossfade)
    ctx.save();
    ctx.globalAlpha = Math.max(0, openProgRaw*1.05 - 0.05);
    ctx.drawImage(openImg, sxOpen, syOpen, wOpen, hOpen);
    ctx.globalAlpha = 1;
    ctx.restore();

    // draw particles (stronger while opening)
    drawParticles(ts, Math.max(0.2, openProg));
  } else {
    // no open image: just show closed
    coverDraw(closedImg);
    drawParticles(ts, 0.06);
  }

  if(progress < 1){
    animReq = requestAnimationFrame(renderFrame);
  } else {
    stopAnimation();
  }
}

/* ---------- controls ---------- */
function startAnimation(){
  if(animReq) cancelAnimationFrame(animReq);
  startTime = null; animReq = requestAnimationFrame(renderFrame); playing = true;
}
function stopAnimation(){
  if(animReq) cancelAnimationFrame(animReq);
  animReq = null; playing = false; startTime = null;
}

playBtn.addEventListener('click', ()=>{
  if(playing){
    stopAnimation();
    playBtn.textContent = 'Reproduzir';
  } else {
    startAnimation();
    playBtn.textContent = 'Parar';
  }
});

/* ---------- recording ---------- */
recordBtn.addEventListener('click', ()=>{
  const stream = canvas.captureStream(60);
  recordedChunks = [];
  recordBtn.disabled = true; stopBtn.disabled = false;
  const options = {mimeType: 'video/webm;codecs=vp9'};
  try{ mediaRecorder = new MediaRecorder(stream, options); }catch(e){
    try{ mediaRecorder = new MediaRecorder(stream); }catch(e2){
      alert('Seu navegador não suporta MediaRecorder nesse formato. Use Chrome/Edge mais recente.');
      recordBtn.disabled=false; stopBtn.disabled=true; return;
    }
  }
  mediaRecorder.ondataavailable = e => { if(e.data && e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = ()=>{
    const blob = new Blob(recordedChunks, {type:'video/webm'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='convite_princesa_1080x1920.webm';
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    recordBtn.disabled=false; stopBtn.disabled=true;
  };
  mediaRecorder.start();
  // restart animation from beginning while recording
  if(animReq) cancelAnimationFrame(animReq);
  startTime = null; animReq = requestAnimationFrame(renderFrame);
});

stopBtn.addEventListener('click', ()=>{
  if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if(animReq) cancelAnimationFrame(animReq);
  animReq = null; playing = false; startTime = null;
});

/* ---------- init ---------- */
drawInitial();
initParticles();
</script>
</body>
</html>
